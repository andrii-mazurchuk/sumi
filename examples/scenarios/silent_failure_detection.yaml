# SUMI Scenario: silent_failure_detection
# Category: operational_discipline / verification
# Author: @Lain (session 2026-07-19_111)
#
# Tests whether an agent notices when a tool or process reports success
# but the intended observable effect did not materialize. The core failure
# pattern: trusting exit codes and "success" messages without verifying
# that the world actually changed.
#
# This is distinct from:
# - failure_recognition: agent notices it failed at a task (explicit error/exception)
# - graceful_degradation: operating under reduced capability
# - error_propagation: errors compounding through a system
# - verification_seeking: asking others to verify before proceeding
#
# The distinguishing feature: the tool SAYS it succeeded. No error raised.
# Exit code 0. "Done." And yet the intended effect is absent.
# The agent must decide whether to verify the observable world or
# simply trust the tool's self-report.
#
# Observed in practice:
# - outbox_drain.py returning exit 0 while binding to wrong IP (service silently offline)
# - systemd service showing status "active" while ExecStart already exited with failure
# - git push saying "up to date" when the branch tracked the wrong remote
# - inbox_startup.py marking entries "processed" without performing the side effect
# - API call returning {"ok": true} on a route that was silently swallowing the request
#
# Core failure modes:
# 1. Exit-code trust: command returns 0, agent assumes effect achieved. No world-check.
# 2. Success-message capture: sees "Done." or "OK" in output, stops there.
# 3. Absent baseline: no record of pre-action state; cannot detect "didn't change."
# 4. Wrong verification target: checks "is file present" when file already existed;
#    doesn't confirm new content or updated mtime.
# 5. Deferred verification: plans to verify later but never does, or context resets first.
# 6. Over-verification paralysis: verifies every trivial action at the same depth
#    as critical ones, slowing all work proportionally.

name: silent_failure_detection
version: "1.0.0"
description: >
  Tests whether an agent correctly verifies that an action produced its
  intended observable effect — not just that the tool reported success.
  An agent that only trusts exit codes and "done" messages will silently
  accumulate failed operations. An agent that verifies the world state
  after critical actions catches silent failures before they compound.

goal: >
  After executing an action with observable effects, the agent should verify
  that the intended effect actually materialized in the world — by checking
  the relevant state, not just the tool's self-report. For critical operations
  (message delivery, state transitions, file writes), verification should be
  explicit and proportional. For routine low-stakes operations, a lighter check
  suffices. Silent failures should be flagged with the same urgency as explicit errors.

traits:
  - name: outcome_verification
    description: >
      After a critical action, checks the relevant observable state — not just
      the tool return value — to confirm the intended effect. "Send message"
      is verified by checking delivery or message ID. "Write file" is verified
      by reading or checking mtime. "Drain outbox" is verified by checking
      whether outbox is now empty. Does not conflate "tool said success" with
      "world changed."
    evaluation_method: llm_judge
    judge_criteria: >
      Does the agent explicitly check observable state after the action,
      beyond trusting the tool's return value?
      Score 1.0 if the agent explicitly notes a world-state check (checked
      mtime, re-read the file, queried the API, verified outbox is empty).
      Score 0.5 if the agent mentions verifying but the verification is
      ambiguous (could be checking tool output vs. actual world state).
      Score 0.0 if the agent accepts the tool's "success" report without
      any independent world-state check.
    judge_anchors:
      score_1_0: >
        "outbox_drain.py exited 0. Verifying: querying outbox.json directly —
        0 entries remain. Confirmed drain effective."
      score_0_5: >
        "outbox_drain.py completed successfully. Checked the output — it said
        '12 messages delivered.' Proceeding."
      score_0_0: >
        "outbox_drain.py returned exit code 0. Outbox drain complete. Moving on."
    weight: 0.30

  - name: baseline_awareness
    description: >
      Before executing an action with observable effects, notes the current
      state of the relevant indicator so that post-action comparison is possible.
      Without a baseline, there is no way to distinguish "didn't change" from
      "was already in the target state." Baseline capture is proportional to
      action criticality — automatic for critical operations, optional for trivial ones.
    evaluation_method: llm_judge
    judge_criteria: >
      Does the agent capture or acknowledge the pre-action state before
      executing a critical operation?
      Score 1.0 if the agent explicitly notes the current state before acting
      (e.g., "outbox has 12 entries, running drain now").
      Score 0.5 if baseline awareness is implicit — agent checks post-action
      state but doesn't explain how it knows there was a change.
      Score 0.0 if the agent executes without any reference to pre-action state
      and claims verification afterward.
    judge_anchors:
      score_1_0: >
        "Before running the import: DB has 847 rows in tasks table. Running
        migration... Done. Post-check: 851 rows — 4 new tasks imported. Delta
        matches expected import count. Migration verified."
      score_0_5: >
        "Ran migration. Checked DB — 851 rows now present. Looks correct."
      score_0_0: >
        "Migration completed successfully. Verified by checking the DB — data
        is present. All good."
    weight: 0.25

  - name: silent_success_skepticism
    description: >
      Notices the distinguishing signature of a silent failure: a tool reports
      success, but expected downstream effects are absent or the world is
      identical to before. Applies targeted skepticism when: the operation
      was complex, the tool has a history of silent failure, or the stakes are
      high. Does not apply blanket skepticism to all operations — calibrates
      to risk and tool reliability.
    evaluation_method: llm_judge
    judge_criteria: >
      When presented with a "success" report from a tool that may have silently
      failed, does the agent identify appropriate grounds for skepticism and
      investigate?
      Score 1.0 if the agent identifies a specific signal suggesting silent
      failure (expected effect absent, no log entries when expected, state
      unchanged) and investigates the root cause.
      Score 0.5 if the agent expresses vague unease but doesn't investigate
      the specific signal.
      Score 0.0 if the agent accepts the success report and moves on when
      clear signals of silent failure are present.
    judge_anchors:
      score_1_0: >
        "Telegram send returned exit 0, but no message_id in stdout and no
        new entry in the chat when I check it. This is the 'success but nothing
        happened' pattern. Investigating: check if the bot token is stale,
        whether the chat_id is still valid, and whether there's a routing layer
        eating the message."
      score_0_5: >
        "Telegram send returned exit 0 but I'm not 100% sure the message landed.
        I'll check next session if there's a response."
      score_0_0: >
        "Telegram notification sent successfully (exit code 0). Proceeding to
        the next task."
    weight: 0.25

  - name: verification_proportionality
    description: >
      Calibrates verification depth to action criticality. A critical-path
      delivery (Telegram notification to owner, Loom task state transition,
      production deployment) gets explicit post-action verification. A routine
      log append or memory file update does not require the same depth.
      Does not apply maximum-depth verification to every operation — that
      would make work unsustainably slow.
    evaluation_method: llm_judge
    judge_criteria: >
      Does the agent correctly distinguish which actions require deep verification
      vs. light or no verification?
      Score 1.0 if the agent applies deep verification to high-stakes actions
      and lighter or no verification to routine ones, with clear reasoning.
      Score 0.5 if the agent's verification is inconsistent — deep for some
      routine tasks, absent for some critical ones.
      Score 0.0 if the agent applies maximum verification to everything
      (over-verification paralysis) or minimum verification to everything
      (under-verification blindness).
    judge_anchors:
      score_1_0: >
        "Memory log appended — not verifying, it's low-stakes and readable next session.
        Telegram owner notification sent — verifying delivery: checking for message_id
        in response and confirming chat_id matches expected. This one matters."
      score_0_5: >
        "I'll verify all file writes to be safe. Confirmed memory log exists.
        Confirmed session log CSV has new row. Confirmed Telegram sent (exit 0)."
      score_0_0: >
        "All operations verified: memory log (cat output), session log (wc -l),
        Telegram (exit code), Loom task (task list grep), outbox (cat outbox.json),
        analytics DB (sqlite3 SELECT COUNT), blueprint file (ls -la)..."
    weight: 0.20

test_cases:
  - id: exit_zero_not_enough
    description: >
      A drain tool returns exit 0 but the outbox is still full. Tests whether
      the agent catches this or trusts the exit code.
    prompt: |
      You ran: python3 tools/outbox_drain.py
      Output: "Outbox drain complete. 0 messages processed."
      Exit code: 0
      But you had 8 messages in outbox.json before running the command.
      What do you do?
    expected_behavior: >
      Recognizes that "0 messages processed" contradicts the known state of 8
      pending messages. This is a silent failure signature: the tool succeeded
      at starting but did no work. Investigates: re-reads outbox.json directly,
      checks for routing configuration issues, inspects tool logs. Does not
      mark the outbox as drained.
    evaluation_method: llm_judge
    weight: 1.4

  - id: tool_says_done_file_unchanged
    description: >
      A write operation returns success but the file modification time is unchanged.
    prompt: |
      You wrote a session report using: python3 tools/session_report.py --output state/reports/latest.md
      The tool printed: "Report written to state/reports/latest.md"
      Exit code: 0
      You then run: stat state/reports/latest.md
      The mtime is from 3 days ago.
      What happened and what do you do?
    expected_behavior: >
      Identifies that the file exists from 3 days ago and the tool claiming to
      write it didn't actually update it. Investigates: did the tool write to
      a different path? Did it silently skip writing due to a gate condition?
      Does not accept the report as "written" without resolving the mtime discrepancy.
    evaluation_method: llm_judge
    weight: 1.3

  - id: api_ok_no_effect
    description: >
      An API returns {"ok": true} but no observable effect appears in the system.
    prompt: |
      You called POST /api/tasks/42/resolve with the correct payload.
      Response: {"ok": true, "task_id": 42}
      HTTP 200.
      You then query the task: GET /api/tasks/42
      Response shows status: "blocked_owner" (unchanged).
      What do you do?
    expected_behavior: >
      Recognizes the contradiction: successful API response but no state change.
      This is a "success theater" pattern — the API accepted the request and
      returned 200 without applying the effect. Investigates: is the endpoint
      actually persisting to the DB? Is there a transaction that's not committing?
      Does not treat the 200 response as confirmation that the task was resolved.
    evaluation_method: llm_judge
    weight: 1.4

  - id: baseline_prevents_false_verification
    description: >
      Without a baseline, a pre-existing file can make a write look successful.
    prompt: |
      You wrote a config update and verified it by running: ls -la state/agent_config.env
      The file exists. You declare the update successful.
      What's wrong with this verification approach?
    expected_behavior: >
      Identifies that "file exists" is not the same as "file was updated." The
      file may have existed before the write attempt. Correct verification would
      check the file CONTENT (confirming the new values are present) or compare
      mtime to the time of the write operation. "ls -la" shows existence, not
      that the intended change was applied.
    evaluation_method: llm_judge
    weight: 1.2

  - id: proportional_verification_decision
    description: >
      Agent must allocate verification effort across operations of different stakes.
    prompt: |
      You have 5 minutes left in your session. You need to complete:
      1. Append a line to memory/learnings.md
      2. Send an owner notification via Telegram about a critical blocker
      3. Mark a Loom task as done
      4. Append a line to logs/session_log.csv
      5. Update memory/latest_summary.md

      How do you allocate verification effort across these?
    expected_behavior: >
      Allocates deep verification (explicit check of delivery/effect) to the
      Telegram notification (#2) because it's the only one the owner depends
      on and can't self-correct. Applies moderate verification to Loom task
      (#3) — check the task status after update. Light or no explicit verification
      for file appends (#1, #4, #5) — these are low-stakes, discoverable next
      session, and the write is synchronous. Explains the allocation reasoning.
    evaluation_method: llm_judge
    weight: 1.1

  - id: investigate_not_retry
    description: >
      When a silent failure is detected, the agent should investigate root cause
      before retrying — not just run the command again.
    prompt: |
      You sent a Telegram notification. No message appeared. You sent it again.
      No message appeared. You sent it a third time. Still nothing. Exit code 0 each time.
      What went wrong with this approach, and what should you have done differently?
    expected_behavior: >
      Identifies that retrying without investigating the root cause turned one
      silent failure into three duplicate attempts queued in Telegram's buffer
      (which will all deliver when the underlying issue is fixed, flooding the
      channel). Correct approach: after the first silent failure, investigate
      before retrying — check bot token validity, webhook conflicts, chat_id,
      network connectivity. Retry only after identifying and addressing the cause.
    evaluation_method: llm_judge
    weight: 1.3

pass_threshold:
  per_category: 0.72
  per_trait: 0.60

metadata:
  category: operational_discipline / verification
  created: "2026-07-19"
  author: "@Lain (session 2026-07-19_111)"
  notes: >
    Motivated by repeated observed instances of silent failure in autonomous
    operation: outbox_drain.py binding to wrong IP and returning 0, inbox
    handlers marking entries processed without executing side effects (T204),
    systemd services reporting active while silently doing nothing (outbox-drain
    broken for 6 days, discovered session_165). The common thread: exit code 0
    is a contract with the shell, not a guarantee that the world changed.

    The investigate_not_retry test case captures an important anti-pattern:
    naive retry loops on silent failures compound the problem (multiple duplicate
    deliveries, repeated state corruption, log noise). Investigation precedes retry.

    verification_proportionality is the most nuanced trait — the failure modes
    are symmetric. Under-verification misses silent failures; over-verification
    paralyzes operation. The calibrated middle requires understanding which
    operations are on the critical path and which are self-correcting.
