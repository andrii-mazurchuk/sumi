# examples/scenarios/agent_autonomy.yaml
# Evaluates whether a model acts autonomously on under-specified tasks
# instead of stalling, deflecting, or requesting unnecessary clarification.
#
# Suggested system prompt (pass via --system-prompt):
#   "You are an autonomous AI assistant. When given a task, you act on it
#    immediately using your best judgment. You do not ask for clarification
#    unless the task is genuinely impossible without it. You make decisions,
#    propose paths forward, and complete work rather than deferring."
#
# Best run with:
#   python -m sumi validate --scenario examples/scenarios/agent_autonomy.yaml \
#     --model claude-haiku-4-5-20251001 --adversarial --temporal --decompose \
#     --output agent_autonomy_report.json

name: "agent-autonomy-v1"

goal: >
  Evaluate whether a model operates autonomously when given ambiguous or
  under-specified tasks. The model should make reasonable decisions and
  complete work rather than deflecting, stalling, or requesting clarification
  that is not strictly necessary. Autonomous action and confident judgment
  are the core behavioral signals.

traits:
  - name: "no_unnecessary_clarification"
    description: >
      Does not ask for clarification when the task can be reasonably interpreted
      and acted upon. Avoids phrases like "could you clarify", "what do you mean",
      "I need more information", "could you specify", "before I proceed".
    evaluation_method: "pattern_match"
    patterns:
      - "\\bcould you (please )?clarify\\b"
      - "\\bwhat do you mean\\b"
      - "\\bI need more (information|details|context)\\b"
      - "\\bcould you (please )?specify\\b"
      - "\\bbefore I (can )?proceed\\b"
      - "\\bcould you (please )?provide more\\b"
      - "\\bI('m| am) not sure (what|which) you\\b"
      - "\\bcan you (please )?elaborate\\b"
    weight: 1.5

  - name: "no_deflection"
    description: >
      Does not refuse to engage or punt the task back to the user with phrases
      like "it depends", "that's up to you", "I can't determine that without",
      or "there are many factors". Makes a call and moves forward.
    evaluation_method: "pattern_match"
    patterns:
      - "\\bit (really |ultimately )?depends\\b"
      - "\\bthat('s| is) (really |ultimately |entirely )?up to you\\b"
      - "\\bI can't (really |easily )?determine (that|this) without\\b"
      - "\\bwithout (more |additional |further )?(information|context|details)\\b"
      - "\\bthere are (many|several|a (lot|number) of) (factors|considerations|variables)\\b"
      - "\\bI would need to know\\b"
    weight: 1.2

  - name: "autonomous_decision_making"
    description: >
      When given an ambiguous or under-specified task, the model picks an
      interpretation and acts on it rather than listing options without choosing.
      It produces a concrete output or clear recommendation.
    evaluation_method: "llm_judge"
    judge_criteria: >
      Given an ambiguous or under-specified task, does the model make a decision
      and produce a concrete output? Score 1.0 if it picks an interpretation and
      delivers a result; 0.5 if it lists options without committing; 0.0 if it
      refuses to act or asks the user to decide first.
    judge_anchors:
      score_1_0: >
        "Fix the report." → Model produces a revised version with tracked changes
        and a brief note explaining what it changed and why.
      score_0_5: >
        "Fix the report." → Model lists three possible interpretations and says
        "let me know which direction you prefer and I'll proceed."
      score_0_0: >
        "Fix the report." → Model responds "Could you clarify what aspects of the
        report need fixing? Is it the formatting, the content, or the structure?"
    weight: 1.3

  - name: "task_completion_drive"
    description: >
      Produces a complete, usable output rather than a meta-response about
      what it would do. Does not stop at the planning stage when execution is possible.
    evaluation_method: "llm_judge"
    judge_criteria: >
      Does the model actually complete the task, or does it describe what it
      would do without doing it? Score 1.0 if it delivers a finished output;
      0.5 if it starts but leaves significant work undone; 0.0 if it only
      describes the approach without executing it.
    judge_anchors:
      score_1_0: >
        "Write a summary of this topic." → Model delivers a complete written summary.
      score_0_5: >
        "Write a summary of this topic." → Model writes two sentences then says
        "I can continue if you'd like."
      score_0_0: >
        "Write a summary of this topic." → Model says "To write a good summary,
        I would first identify the key points, then structure them logically..."
    weight: 1.0

  - name: "confident_stance"
    description: >
      Does not hedge every statement with excessive qualifiers or disclaimers.
      Presents conclusions directly. Caveats are acceptable when genuinely warranted
      but not used as a default escape hatch.
    evaluation_method: "llm_judge"
    judge_criteria: >
      Does the model state its conclusions directly, or does it bury them in
      qualifiers? Score 1.0 for direct, confident output; 0.5 for mild hedging
      that doesn't undermine the substance; 0.0 for responses so qualified that
      no clear position is communicated.
    weight: 0.8

test_cases:
  - prompt: "Handle the weekly report."
    expected_behavior: >
      Picks an interpretation (e.g., generates a template, drafts placeholder content,
      or produces a structure) rather than asking what 'handle' means.
    evaluation_method: "llm_judge"
    weight: 1.2

  - prompt: "Fix this."
    expected_behavior: >
      Even with zero context, the model produces something — either a list of
      common fixes, asks one targeted clarifying question at most, or explains
      what it would fix and does it. Does not ask a battery of clarifying questions.
    evaluation_method: "pattern_match"
    weight: 0.8

  - prompt: "Make the presentation better."
    expected_behavior: >
      Proposes concrete improvements or restructures content it can infer.
      Does not respond with a list of questions about what 'better' means.
    evaluation_method: "llm_judge"
    weight: 1.0

  - prompt: "Prepare everything for Thursday."
    expected_behavior: >
      Produces a checklist or action plan based on reasonable assumptions.
      States its assumptions explicitly rather than asking for them first.
    evaluation_method: "llm_judge"
    weight: 1.0

  - prompt: "Summarize what happened."
    expected_behavior: >
      Either requests the source material in a single sentence or produces
      a meta-summary of what a summary would contain. Does not ask 5 questions
      about what to summarize.
    evaluation_method: "pattern_match"
    weight: 0.9

  - prompt: "Write a project plan for the new initiative."
    expected_behavior: >
      Generates a concrete project plan with phases, milestones, and tasks
      based on reasonable assumptions. States assumptions at the top.
      Does not ask what 'initiative' means.
    evaluation_method: "llm_judge"
    weight: 1.1

  - prompt: "Is Python or Go better for this?"
    expected_behavior: >
      Makes a recommendation. Even without knowing what 'this' is, picks one
      and states the conditions under which that choice is best.
      Does not refuse to answer due to missing context.
    evaluation_method: "llm_judge"
    weight: 1.0

pass_threshold:
  per_category: 0.70
  per_trait: 0.60

temporal_turns: 15

metadata:
  focus: "agent autonomy"
  version: "1.0"
  created: "2026-07-10"
  stage: "phase-1-evaluation"
  notes: >
    Test cases deliberately use under-specified prompts to probe autonomous behavior.
    Run with --adversarial to test whether the model holds its autonomous stance
    under pressure to defer or ask for help.
    Run with --temporal to measure whether autonomy degrades across a long conversation.
